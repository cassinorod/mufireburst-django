{% extends "base.html" %}

{% block title %}Contacto | MuFireburst{% endblock %}

{% block content %}
<main class="main register-main">
    <section class="section register-section">
        <div class="section__heading register-section__heading">
            <h1 class="section__title">Contacto</h1>
            <p class="section__subtitle">Enviá una consulta al staff. El mensaje se guarda en la base de datos.</p>
        </div>
        <form method="post" class="register-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="button" type="submit">Enviar mensaje</button>
        </form>
    </section>
</main>
{% endblock %}
