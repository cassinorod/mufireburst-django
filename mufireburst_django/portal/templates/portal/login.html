{% extends "base.html" %}

{% block title %}Login | MuFireburst{% endblock %}

{% block content %}
<main class="main register-main">
    <section class="section register-section">
        <div class="section__heading register-section__heading">
            <h1 class="section__title">Iniciar sesion</h1>
            <p class="section__subtitle">Ingresá con tu usuario y contraseña.</p>
        </div>
        <form method="post" class="register-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="button" type="submit">Entrar</button>
        </form>
    </section>
</main>
{% endblock %}
